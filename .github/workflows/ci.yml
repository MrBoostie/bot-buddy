name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enforce changelog updates for behavior-visible PR changes
        if: github.event_name == 'pull_request'
        run: |
          chmod +x scripts/check-changelog-policy.sh
          scripts/check-changelog-policy.sh "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"

      - name: Type check
        run: npm run check

      - name: Test
        run: npm test
