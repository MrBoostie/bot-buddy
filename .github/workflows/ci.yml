name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enforce changelog updates for behavior-visible PR changes
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"
          CHANGED="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"

          echo "Changed files:" 
          echo "$CHANGED"

          if echo "$CHANGED" | grep -Eq '^(src/|scripts/|package\.json|README\.md)'; then
            if ! echo "$CHANGED" | grep -q '^CHANGELOG\.md$'; then
              echo "::error::CHANGELOG.md must be updated when behavior-visible files change in a PR."
              exit 1
            fi
          fi

      - name: Type check
        run: npm run check

      - name: Test
        run: npm test
