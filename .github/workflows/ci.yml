name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enforce changelog updates for behavior-visible PR changes
        if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'skip-changelog')
        run: |
          chmod +x scripts/check-changelog-policy.sh
          scripts/check-changelog-policy.sh "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"

      - name: Changelog policy bypass active
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'skip-changelog')
        run: echo "skip-changelog label present; changelog policy check bypassed for this PR"

      - name: Verify quick (typecheck, docs links, changelog-policy fixtures)
        run: npm run verify:quick

  full-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint changelog policy script
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck scripts/check-changelog-policy.sh

      - name: Verify (typecheck, docs links, tests)
        run: npm run verify
